services:
  wander-agent:
    build:
      context: .
      dockerfile: services/wander-agent/Dockerfile
    ports:
      - "8000:8000"
    environment:
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      TAVILY_API_KEY: ${TAVILY_API_KEY}
      LISTINGS_SERVICE_URL: http://listings:8000
      TRAVEL_SERVICE_URL: http://travel:8000
    depends_on:
      - listings
      - travel

  listings:
    build:
      context: .
      dockerfile: services/listings/Dockerfile
    ports:
      - "8001:8000"
    environment:
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      PEXELS_API_KEY: ${PEXELS_API_KEY}

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - wander-agent
      - listings
