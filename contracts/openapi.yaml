openapi: "3.1.0"
info:
  title: Travel Agent API
  version: "0.1.0"
  description: API contract between the Python agent service and TypeScript clients.
servers:
  - url: http://localhost:8000
    description: Local development
paths:
  /health:
    get:
      operationId: getHealth
      summary: Health check
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                properties:
                  status:
                    type: string
                    example: ok
