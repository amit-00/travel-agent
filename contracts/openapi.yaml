openapi: "3.1.0"
info:
  title: Travel Agent API
  version: "0.1.0"
  description: API contract between the Python agent service and TypeScript clients.
servers:
  - url: http://localhost:8000
    description: Local development
paths:
  /health:
    get:
      operationId: getHealth
      summary: Health check
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                properties:
                  status:
                    type: string
                    example: ok
  /flights:
    get:
      operationId: getFlights
      summary: Search one-way flights
      parameters:
        - name: departure_airport
          in: query
          required: true
          schema:
            type: string
            minLength: 3
            maxLength: 3
            example: JFK
        - name: arrival_airport
          in: query
          required: true
          schema:
            type: string
            minLength: 3
            maxLength: 3
            example: LAX
        - name: traveler_count
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            example: 2
        - name: departure_datetime
          in: query
          required: false
          schema:
            type: string
            format: date-time
            example: "2026-07-01T10:00:00"
        - name: arrival_datetime
          in: query
          required: false
          schema:
            type: string
            format: date-time
            example: "2026-07-01T18:00:00"
      responses:
        "200":
          description: Three one-way flight options
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlightsResponse"
        "400":
          description: Both departure_datetime and arrival_datetime were provided
        "422":
          description: Validation error — missing required field or constraint violated
        "502":
          description: Upstream LLM failure
components:
  schemas:
    Layover:
      type: object
      required: [airport, duration_minutes]
      properties:
        airport:
          type: string
          description: IATA airport code
          example: ORD
        duration_minutes:
          type: integer
          minimum: 1
          example: 90
    FlightOption:
      type: object
      required:
        - airline
        - departure_datetime
        - arrival_datetime
        - cost_per_ticket
        - layovers
      properties:
        airline:
          type: string
          example: Delta
        departure_datetime:
          type: string
          format: date-time
        arrival_datetime:
          type: string
          format: date-time
        cost_per_ticket:
          type: number
          format: float
          exclusiveMinimum: 0
          example: 299.99
        layovers:
          type: array
          items:
            $ref: "#/components/schemas/Layover"
    FlightsResponse:
      type: object
      required:
        - departure_airport
        - arrival_airport
        - traveler_count
        - options
      properties:
        departure_airport:
          type: string
          example: JFK
        arrival_airport:
          type: string
          example: LAX
        traveler_count:
          type: integer
          example: 2
        options:
          type: array
          minItems: 3
          maxItems: 3
          items:
            $ref: "#/components/schemas/FlightOption"
